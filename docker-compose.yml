version: '3.8'
services:
  bot:
    build: .
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - backups:/app/backups
    ports:
      - "3000:3000" # if you add a dashboard

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: securitybot
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  backups:
